[project]
name = "aero"
version = "0.1.0"
description = "Aero — 气象科研 AI Agent IDE"
authors = ["Aero Team"]
channels = ["conda-forge"]
platforms = ["linux-64", "osx-arm64", "osx-64"]

[tasks]
run = "python -m aero.cli.main"
test = "pytest tests/"
lint = "ruff check src/ tests/"
fmt = "ruff format src/ tests/"

[dependencies]
python = ">=3.12,<3.14"
pydantic = ">=2.0"
pyyaml = ">=6.0"
httpx = ">=0.27"
xarray = ">=2024.1"
netcdf4 = ">=1.7"
cdsapi = ">=0.7"
structlog = ">=24.1"
textual = ">=8.2,<9"
pdfplumber = ">=0.11"

[feature.dev.dependencies]
pytest = ">=8.0"
pytest-asyncio = ">=0.23"
pytest-mock = ">=3.12"
pytest-timeout = ">=2.2"
ruff = ">=0.4"

[feature.dev.tasks]
lint = "ruff check src/ tests/"
